/* ===================== MAZE GENERATION ===================== */
function generateMaze(size) {
  const cells = [];
  for (let r = 0; r < size; r++) {
    cells[r] = [];
    for (let c = 0; c < size; c++) {
      cells[r][c] = {r, c, walls:{top:true,right:true,bottom:true,left:true}, visited:false};
    }
  }
  const center = Math.floor(size / 2);
  const stack = [];
  const startCell = cells[center][center];
  startCell.visited = true;
  stack.push(startCell);

  function neighbors(cell) {
    const {r,c} = cell;
    const n = [];
    if (r > 0 && !cells[r-1][c].visited) n.push(cells[r-1][c]);
    if (r < size-1 && !cells[r+1][c].visited) n.push(cells[r+1][c]);
    if (c > 0 && !cells[r][c-1].visited) n.push(cells[r][c-1]);
    if (c < size-1 && !cells[r][c+1].visited) n.push(cells[r][c+1]);
    return n;
  }

  function removeWall(a, b) {
    if (a.r === b.r) {
      if (a.c < b.c) { a.walls.right = false; b.walls.left = false; }
      else { a.walls.left = false; b.walls.right = false; }
    } else {
      if (a.r < b.r) { a.walls.bottom = false; b.walls.top = false; }
      else { a.walls.top = false; b.walls.bottom = false; }
    }
  }

  while (stack.length > 0) {
    const current = stack[stack.length - 1];
    const nb = neighbors(current);
    if (nb.length > 0) {
      const next = nb[Math.floor(Math.random() * nb.length)];
      removeWall(current, next);
      next.visited = true;
      stack.push(next);
    } else {
      stack.pop();
    }
  }

  // Ensure center has at least 3 open directions
  const cc = cells[center][center];
  const dirs = [
    {dr:-1,dc:0,wall:'top',opp:'bottom'},
    {dr:1,dc:0,wall:'bottom',opp:'top'},
    {dr:0,dc:-1,wall:'left',opp:'right'},
    {dr:0,dc:1,wall:'right',opp:'left'},
  ];
  let openCount = dirs.filter(d => !cc.walls[d.wall]).length;
  const closedDirs = dirs.filter(d => cc.walls[d.wall] && center+d.dr >= 0 && center+d.dr < size && center+d.dc >= 0 && center+d.dc < size);
  while (openCount < 3 && closedDirs.length > 0) {
    const d = closedDirs.splice(Math.floor(Math.random()*closedDirs.length),1)[0];
    cc.walls[d.wall] = false;
    cells[center+d.dr][center+d.dc].walls[d.opp] = false;
    openCount++;
  }

  // Pick random corner as goal
  const corners = [[0,0],[0,size-1],[size-1,0],[size-1,size-1]];
  const goal = corners[Math.floor(Math.random()*corners.length)];

  // Reset visited for game use
  for (let r = 0; r < size; r++)
    for (let c = 0; c < size; c++)
      cells[r][c].visited = false;

  return {cells, size, start:[center,center], goal};
}

/* ===================== BFS PATH FINDING ===================== */
function bfsPath(maze, from, to) {
  const {cells, size} = maze;
  const visited = Array.from({length:size},()=>Array(size).fill(false));
  const parent = Array.from({length:size},()=>Array(size).fill(null));
  const queue = [from];
  visited[from[0]][from[1]] = true;

  const dirMap = {top:[-1,0],bottom:[1,0],left:[0,-1],right:[0,1]};

  while (queue.length > 0) {
    const [r,c] = queue.shift();
    if (r === to[0] && c === to[1]) {
      const path = [];
      let cur = to;
      while (cur) { path.unshift(cur); cur = parent[cur[0]][cur[1]]; }
      return path;
    }
    const cell = cells[r][c];
    for (const [wall, [dr,dc]] of Object.entries(dirMap)) {
      const nr = r+dr, nc = c+dc;
      if (nr>=0&&nr<size&&nc>=0&&nc<size&&!cell.walls[wall]&&!visited[nr][nc]) {
        visited[nr][nc] = true;
        parent[nr][nc] = [r,c];
        queue.push([nr,nc]);
      }
    }
  }
  return [];
}

function getAccessibleNeighbors(maze, r, c) {
  const {cells, size} = maze;
  const cell = cells[r][c];
  const dirMap = {top:[-1,0],bottom:[1,0],left:[0,-1],right:[0,1]};
  const result = [];
  for (const [wall,[dr,dc]] of Object.entries(dirMap)) {
    if (!cell.walls[wall]) {
      const nr = r+dr, nc = c+dc;
      if (nr>=0&&nr<size&&nc>=0&&nc<size) result.push([nr,nc]);
    }
  }
  return result;
}

  /* ---- Question Pool ---- */
  function drawQuestion(type) {
    const pool = questionPool[type];
    if (pool.length === 0) {
      const fresh = type === 'medium' ? [...QUESTIONS_MEDIUM] : [...QUESTIONS_HARD];
      for (let i = fresh.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [fresh[i],fresh[j]] = [fresh[j],fresh[i]];
      }
      questionPool[type] = fresh;
    }
    const q = questionPool[type].splice(Math.floor(Math.random()*questionPool[type].length),1)[0];
    // Shuffle answers so correct isn't always A
    const correctAnswer = q.a[q.c];
    const shuffled = [...q.a];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [shuffled[i],shuffled[j]] = [shuffled[j],shuffled[i]];
    }
    return {...q, a: shuffled, c: shuffled.indexOf(correctAnswer)};
  }

  /* ---- Init Level ---- */
  function initLevel(lvl) {
    const size = MAZE_SIZES[lvl];
    const m = [generateMaze(size), generateMaze(size), generateMaze(size)];
    setMazes(m);
    const startPositions = m.map(mz => [...mz.start]);
    setPositions(startPositions);
    const vis = m.map(mz => {
      const s = new Set();
      s.add(`${mz.start[0]},${mz.start[1]}`);
      return s;
    });
    setVisitedCells(vis);
    setFinishOrder([]);
    setActivePlayer(0);
    setStreaks([0,0,0]);
    setFrozen([false,false,false]);
    setLastFrozenBy([null,null,null]);
    setChallenged([false,false,false]);
    setHints([new Set(),new Set(),new Set()]);
    setQuestionPhase(null);
    setCurrentQuestion(null);
    setSelectedAnswer(null);
    setAnswerResult(null);
    setPowerPhase(false);
    setTurnMessage(null);
    setIsAiTurn(false);
    setPendingMove(null);
    setAiComment({0:null,1:null,2:null});
  }

  function startGame(mode, solo) {
    setGameMode(mode);
    setSoloPlayer(solo);
    setLevel(0);
    setScores([0,0,0]);
    setCrowns([0,0,0]);
    setLevelScores([]);
    setQuestionPool({medium:[...QUESTIONS_MEDIUM],hard:[...QUESTIONS_HARD]});
    setScreen('game');
    setTimeout(() => initLevel(0), 50);
  }

  useEffect(() => {
    if (screen === 'game' && level >= 0 && mazes[0] === null) initLevel(0);
  }, [screen]);

  /* ---- Timer Logic ---- */
  useEffect(() => {
    if (questionPhase === 'reading' || questionPhase === 'answering') {
      if (timerRef.current) clearInterval(timerRef.current);
      timerRef.current = setInterval(() => {
        setQuestionTimer(prev => {
          if (prev <= 1) {
            clearInterval(timerRef.current);
            if (!isAiTurn) {
              if (questionPhase === 'reading') {
                setQuestionPhase('answering');
                setQuestionTimer(10);
              } else {
                handleAnswer(null);
              }
            }
            return 0;
          }
          return prev - 1;
        });
      }, 1000);
    }
    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, [questionPhase]);

  /* ---- Next Player ---- */
  function nextPlayer() {
    setQuestionPhase(null);
    setCurrentQuestion(null);
    setSelectedAnswer(null);
    setAnswerResult(null);
    setPowerPhase(false);
    setPendingMove(null);

    const playersInGame = [0,1,2].filter(p => !finishOrder.includes(p));
    if (playersInGame.length === 0 || finishOrder.length >= 3) {
      endLevel();
      return;
    }

    let next = activePlayer;
    do {
      next = (next + 1) % 3;
    } while (finishOrder.includes(next) && playersInGame.length > 0);

    if (frozenRef.current[next]) {
      setFrozen(prev => { const f = [...prev]; f[next] = false; return f; });
      showOverlay(
        `${PLAYERS[next].name} JEST ZAMROŻONY!`,
        'Traci turę',
        '❄️', PLAYERS[next].color, 2000
      ).then(() => {
        let nn = next;
        do { nn = (nn+1)%3; } while (finishOrder.includes(nn));
        setActivePlayer(nn);
      });
      return;
    }
    setActivePlayer(next);
  }

  /* ---- End Level ---- */
  function endLevel() {
    const ls = [...levelScores];
    const levelPts = [0,0,0];
    finishOrder.forEach((pid,idx) => {
      if (idx < 3) levelPts[pid] = POINTS[idx];
    });
    // players who didn't finish get 0
    ls.push(levelPts);
    setLevelScores(ls);

    // Points already added when players reach the goal (movePlayer/movePlayerAfterQuestion)
    // No need to add them again here — just record levelScores for display

    if (level >= 2) {
      setScreen('gameOver');
    } else {
      const nextLvl = level + 1;
      setLevel(nextLvl);
      setTurnMessage(`Poziom ${level+1} ukończony! Następny: ${MAZE_SIZES[nextLvl]}x${MAZE_SIZES[nextLvl]}`);
      setTimeout(() => {
        setTurnMessage(null);
        initLevel(nextLvl);
      }, 2500);
    }
  }

  /* ---- Handle Cell Click ---- */
  function handleCellClick(r, c) {
    if (questionPhase || powerPhase || isAiTurn) return;
    if (finishOrder.includes(activePlayer)) return;

    const pid = activePlayer;
    const maze = mazes[pid];
    const [pr, pc] = positions[pid];
    const key = `${r},${c}`;

    // Check if target is accessible neighbor
    const directNeighbors = getAccessibleNeighbors(maze, pr, pc);
    const isDirect = directNeighbors.some(([nr,nc]) => nr===r && nc===c);

    if (visitedCells[pid].has(key)) {
      // Target is visited — free move (direct neighbor or through visited path)
      if (isDirect) {
        movePlayer(pid, r, c, false);
      } else {
        const pathThroughVisited = canReachThroughVisited(maze, pid, [pr,pc], [r,c]);
        if (!pathThroughVisited) return;
        movePlayer(pid, r, c, false);
      }
    } else {
      // Target is NEW cell — need a question
      // Check if reachable: direct neighbor OR adjacent to any visited cell reachable from player
      if (isDirect) {
        setPendingMove([r,c]);
        triggerQuestion(pid);
      } else {
        // Find if any visited neighbor of the new cell is reachable through visited path
        const neighborsOfTarget = getAccessibleNeighbors(maze, r, c);
        const reachableVisitedNeighbor = neighborsOfTarget.some(([nr,nc]) => {
          const nk = `${nr},${nc}`;
          if (!visitedCells[pid].has(nk)) return false;
          return canReachThroughVisited(maze, pid, [pr,pc], [nr,nc]) ||
                 (nr === pr && nc === pc);
        });
        if (!reachableVisitedNeighbor) return;
        setPendingMove([r,c]);
        triggerQuestion(pid);
      }
    }
  }

  function canReachThroughVisited(maze, pid, from, to) {
    const vis = visitedCells[pid];
    const {cells, size} = maze;
    const seen = new Set();
    const queue = [from];
    seen.add(`${from[0]},${from[1]}`);
    const dirMap = {top:[-1,0],bottom:[1,0],left:[0,-1],right:[0,1]};

    while (queue.length > 0) {
      const [r,c] = queue.shift();
      if (r===to[0]&&c===to[1]) return true;
      const cell = cells[r][c];
      for (const [wall,[dr,dc]] of Object.entries(dirMap)) {
        const nr=r+dr, nc=c+dc;
        const k = `${nr},${nc}`;
        if (nr>=0&&nr<size&&nc>=0&&nc<size&&!cell.walls[wall]&&!seen.has(k)&&vis.has(k)) {
          seen.add(k);
          queue.push([nr,nc]);
        }
      }
    }
    return false;
  }

  function movePlayer(pid, r, c, isNew) {
    const newPos = [...positions];
    newPos[pid] = [r,c];
    setPositions(newPos);

    const newVis = [...visitedCells];
    const s = new Set(newVis[pid]);
    s.add(`${r},${c}`);
    newVis[pid] = s;
    setVisitedCells(newVis);

    // Check if reached goal
    const maze = mazes[pid];
    if (r === maze.goal[0] && c === maze.goal[1]) {
      const newOrder = [...finishOrder, pid];
      setFinishOrder(newOrder);
      const place = newOrder.length;
      const pts = POINTS[place-1] || 0;
      const newScores = [...scores];
      newScores[pid] += pts;
      setScores(newScores);
      const medal = place===1?'🥇':place===2?'🥈':'🥉';
      showOverlay(
        `${PLAYERS[pid].name} UKOŃCZYŁ LABIRYNT!`,
        `${place}. miejsce — +${pts} pkt`,
        medal, PLAYERS[pid].color, 3000
      ).then(() => {
        if (newOrder.length >= 3) {
          setFinishOrder(newOrder);
          endLevel();
        } else {
          nextPlayer();
        }
      });
      return;
    }
  }

  /* ---- Trigger Question ---- */
  function triggerQuestion(pid) {
    const isChallenge = challenged[pid];
    const type = isChallenge ? 'hard' : 'medium';
    const q = drawQuestion(type);
    setCurrentQuestion({...q, type, isChallenge});
    setQuestionPhase('reading');
    setQuestionTimer(10);
    setSelectedAnswer(null);
    setAnswerResult(null);

    if (isChallenge) {
      const newCh = [...challenged];
      newCh[pid] = false;
      setChallenged(newCh);
    }
  }

  /* ---- Handle Answer ---- */
  function handleAnswer(ansIdx) {
    if (timerRef.current) clearInterval(timerRef.current);
    const pid = activePlayer;
    const correct = ansIdx === currentQuestion.c;
    setSelectedAnswer(ansIdx);
    setAnswerResult(correct);
    setQuestionPhase('result');

    if (correct) {
      const newStreaks = [...streaks];
      if (!currentQuestion.isChallenge) {
        newStreaks[pid] = newStreaks[pid] + 1;
      } else {
        newStreaks[pid] = 0;
      }
      setStreaks(newStreaks);

      // Move to new cell
      if (pendingMove) {
        movePlayerAfterQuestion(pid, pendingMove[0], pendingMove[1]);
      }

      if (!currentQuestion.isChallenge) {
        // Hints
        const numHints = newStreaks[pid] >= 2 ? 2 : 1;
        showHints(pid, numHints);

        // After showing result, go to power selection
        setTimeout(() => {
          if (finishOrder.includes(pid)) return;
          setPowerPhase(true);
          setQuestionPhase(null);
        }, 1500);
      } else {
        // Challenge: no bonus, just end turn after showing result
        setTimeout(() => {
          if (!finishOrder.includes(pid)) {
            nextPlayer();
          }
        }, 1500);
      }
    } else {
      // Wrong
      const newStreaks = [...streaks];
      newStreaks[pid] = 0;
      setStreaks(newStreaks);
      // Clear hints
      const newHints = [...hints];
      newHints[pid] = new Set();
      setHints(newHints);

      // Still move to the cell (every entered cell is conquered)
      if (pendingMove) {
        movePlayerAfterQuestion(pid, pendingMove[0], pendingMove[1]);
      }

      setTimeout(() => {
        if (!finishOrder.includes(pid)) {
          nextPlayer();
        }
      }, 1500);
    }
  }

  function movePlayerAfterQuestion(pid, r, c) {
    const newPos = [...positions];
    newPos[pid] = [r,c];
    setPositions(newPos);
    const newVis = [...visitedCells];
    const s = new Set(newVis[pid]);
    s.add(`${r},${c}`);
    newVis[pid] = s;
    setVisitedCells(newVis);

    const maze = mazes[pid];
    if (r === maze.goal[0] && c === maze.goal[1]) {
      const newOrder = [...finishOrder, pid];
      setFinishOrder(newOrder);
      const place = newOrder.length;
      const pts = POINTS[place-1] || 0;
      const newScores2 = [...scores];
      newScores2[pid] += pts;
      setScores(newScores2);
      const medal = place===1?'🥇':place===2?'🥈':'🥉';
      showOverlay(
        `${PLAYERS[pid].name} UKOŃCZYŁ LABIRYNT!`,
        `${place}. miejsce — +${pts} pkt`,
        medal, PLAYERS[pid].color, 3000
      );
    }
  }

  function showHints(pid, count) {
    const maze = mazes[pid];
    const pos = pendingMove || positions[pid];
    const path = bfsPath(maze, pos, maze.goal);
    const newHints = [...hints];
    const s = new Set();
    let added = 0;
    for (let i = 1; i < path.length && added < count; i++) {
      const key = `${path[i][0]},${path[i][1]}`;
      if (!visitedCells[pid].has(key)) {
        s.add(key);
        added++;
      }
    }
    newHints[pid] = s;
    setHints(newHints);
  }

  /* ---- Powers ---- */
  function usePower(power, targetId) {
    const pid = activePlayer;
    if (power === 'freeze') {
      if (lastFrozenBy[targetId] === pid) return; // can't freeze same player twice in a row
      const newFrozen = [...frozen];
      newFrozen[targetId] = true;
      setFrozen(newFrozen);
      const newLFB = [...lastFrozenBy];
      newLFB[targetId] = pid;
      setLastFrozenBy(newLFB);
      setPowerPhase(false);
      showOverlay(
        `${PLAYERS[pid].name} ZAMRAŻA ${PLAYERS[targetId].name}!`,
        `${PLAYERS[targetId].name} traci następną turę`,
        '🧊', PLAYERS[pid].color, 2500
      ).then(() => nextPlayer());
    } else if (power === 'challenge') {
      const newCh = [...challenged];
      newCh[targetId] = true;
      setChallenged(newCh);
      setPowerPhase(false);
      showOverlay(
        `${PLAYERS[pid].name} RZUCA WYZWANIE ${PLAYERS[targetId].name}!`,
        'Następne pytanie będzie HARD!',
        '⚡', PLAYERS[pid].color, 2500
      ).then(() => nextPlayer());
    } else if (power === 'crown') {
      const newCrowns = [...crowns];
      newCrowns[pid]++;
      setCrowns(newCrowns);
      const newScores = [...scores];
      newScores[pid] += 1;
      setScores(newScores);
      setPowerPhase(false);
      showOverlay(
        `${PLAYERS[pid].name} ZDOBYWA KORONĘ!`,
        '+1 punkt bonusowy',
        '👑', '#ffd700', 2500
      ).then(() => nextPlayer());
    }
  }

  /* ---- AI Logic ---- */
  useEffect(() => {
    if (screen !== 'game' || !mazes[0]) return;
    const pid = activePlayer;
    if (!isAI(pid)) { setIsAiTurn(false); return; }
    if (finishOrder.includes(pid)) { nextPlayer(); return; }
    if (frozen[pid]) {
      // handled in nextPlayer already, but just in case
      return;
    }

    setIsAiTurn(true);
    const aiTimeout = setTimeout(() => runAiTurn(pid), 800);
    aiTimeoutRef.current = aiTimeout;
    return () => clearTimeout(aiTimeout);
  }, [activePlayer, screen, mazes[0], finishOrder.length]);

  async function runAiTurn(pid) {
    if (!mazes[pid]) return;
    const maze = mazes[pid];
    const name = PLAYERS[pid].name;

    // Local tracking to avoid stale closure issues between awaits
    let curPos = [...positions[pid]];
    let curVisited = new Set(visitedCells[pid]);

    // === MOVEMENT PHASE (loop through visited cells, stop on new) ===
    while (true) {
      const path = bfsPath(maze, curPos, maze.goal);
      const neighbors = getAccessibleNeighbors(maze, curPos[0], curPos[1]);

      let target;
      if (path.length > 1 && Math.random() < 0.75) {
        target = path[1];
      } else {
        const unvisited = neighbors.filter(([nr,nc]) => !curVisited.has(`${nr},${nc}`));
        if (unvisited.length > 0) {
          target = unvisited[Math.floor(Math.random()*unvisited.length)];
        } else {
          target = neighbors[Math.floor(Math.random()*neighbors.length)];
        }
      }

      const [tr,tc] = target;
      const key = `${tr},${tc}`;
      const wasVisited = curVisited.has(key);

      // Update local tracking
      curPos = [tr,tc];
      curVisited.add(key);

      // Update React state (functional updaters for safety)
      setPositions(prev => { const p = [...prev]; p[pid] = [tr,tc]; return p; });
      setVisitedCells(prev => { const v = [...prev]; const s = new Set(v[pid]); s.add(key); v[pid] = s; return [...v]; });

      // Pause so movement is visible
      await wait(wasVisited ? 500 : 1000);

      // Check goal
      if (tr === maze.goal[0] && tc === maze.goal[1]) {
        const newOrder = [...finishOrder, pid];
        setFinishOrder(newOrder);
        const place = newOrder.length;
        const pts = POINTS[place-1] || 0;
        setScores(prev => { const s = [...prev]; s[pid] += pts; return s; });
        const medal = place===1?'🥇':place===2?'🥈':'🥉';
        await showOverlay(
          `${name} UKOŃCZYŁ LABIRYNT!`,
          `${place}. miejsce — +${pts} pkt`,
          medal, PLAYERS[pid].color, 3000
        );
        nextPlayer();
        return;
      }

      // Visited cell = free move, loop continues
      if (wasVisited) continue;
      // New cell = stop moving, go to question
      break;
    }

    // === QUESTION PHASE ===
    const isChallenge = challenged[pid];
    const type = isChallenge ? 'hard' : 'medium';
    const q = drawQuestion(type);
    const successRate = type === 'hard' ? 0.3 : 0.5;
    const correct = Math.random() < successRate;

    let aiAnswer;
    if (correct) {
      aiAnswer = q.c;
    } else {
      const wrongOptions = [0,1,2,3].filter(i => i !== q.c);
      aiAnswer = wrongOptions[Math.floor(Math.random() * wrongOptions.length)];
    }

    if (isChallenge) {
      setChallenged(prev => { const c = [...prev]; c[pid] = false; return c; });
    }

    // Reading phase
    setCurrentQuestion({...q, type, isChallenge});
    setQuestionPhase('reading');
    setQuestionTimer(10);
    setSelectedAnswer(null);
    setAnswerResult(null);
    await wait(2000);

    // Answering phase
    if (timerRef.current) clearInterval(timerRef.current);
    setQuestionPhase('answering');
    setQuestionTimer(10);
    await wait(2000);

    // AI selects answer
    if (timerRef.current) clearInterval(timerRef.current);
    setSelectedAnswer(aiAnswer);
    setAnswerResult(correct);
    setQuestionPhase('result');
    await wait(2000);

    // Clear question
    setQuestionPhase(null);
    setCurrentQuestion(null);
    setSelectedAnswer(null);
    setAnswerResult(null);

    // === RESULT PHASE ===
    if (correct) {
      setAiComment(prev => ({...prev, [pid]: AI_COMMENTS.correct[Math.floor(Math.random()*AI_COMMENTS.correct.length)]}));
      if (!isChallenge) {
        setStreaks(prev => { const s = [...prev]; s[pid]++; return s; });
      } else {
        setStreaks(prev => { const s = [...prev]; s[pid] = 0; return s; });
      }

      if (!isChallenge) {
        // === POWER PHASE ===
        const others = [0,1,2].filter(i => i !== pid && !finishOrder.includes(i));
        const roll = Math.random();
        let power, targetId;

        if (roll < 0.45 && others.length > 0) {
          const validTargets = others.filter(t => lastFrozenBy[t] !== pid);
          if (validTargets.length > 0) {
            power = 'freeze';
            targetId = validTargets[Math.floor(Math.random()*validTargets.length)];
          } else {
            power = 'crown'; targetId = pid;
          }
        } else if (roll < 0.8 && others.length > 0) {
          power = 'challenge';
          targetId = others[Math.floor(Math.random()*others.length)];
        } else {
          power = 'crown'; targetId = pid;
        }

        // Apply power with message
        setAiComment(prev => ({...prev, [pid]: AI_COMMENTS.powerUsed[Math.floor(Math.random()*AI_COMMENTS.powerUsed.length)]}));

        if (power === 'freeze') {
          setFrozen(prev => { const f = [...prev]; f[targetId] = true; return f; });
          setLastFrozenBy(prev => { const l = [...prev]; l[targetId] = pid; return l; });
          if (isAI(targetId)) {
            setTimeout(() => {
              setAiComment(prev => ({...prev, [targetId]: AI_COMMENTS.frozen[Math.floor(Math.random()*AI_COMMENTS.frozen.length)]}));
            }, 400);
          }
          await showOverlay(
            `${name} ZAMRAŻA ${PLAYERS[targetId].name}!`,
            `${PLAYERS[targetId].name} traci następną turę`,
            '🧊', PLAYERS[pid].color, 2500
          );
        } else if (power === 'challenge') {
          setChallenged(prev => { const c = [...prev]; c[targetId] = true; return c; });
          await showOverlay(
            `${name} RZUCA WYZWANIE ${PLAYERS[targetId].name}!`,
            'Następne pytanie będzie HARD!',
            '⚡', PLAYERS[pid].color, 2500
          );
        } else {
          setCrowns(prev => { const c = [...prev]; c[pid]++; return c; });
          setScores(prev => { const s = [...prev]; s[pid] += 1; return s; });
          await showOverlay(
            `${name} ZDOBYWA KORONĘ!`,
            '+1 punkt bonusowy',
            '👑', '#ffd700', 2500
          );
        }

        nextPlayer();
      } else {
        // Challenge correct — no power, end turn
        await wait(1000);
        nextPlayer();
      }
    } else {
      // Wrong answer
      setAiComment(prev => ({...prev, [pid]: AI_COMMENTS.wrong[Math.floor(Math.random()*AI_COMMENTS.wrong.length)]}));
      setStreaks(prev => { const s = [...prev]; s[pid] = 0; return s; });
      setHints(prev => { const h = [...prev]; h[pid] = new Set(); return h; });
      await wait(1500);
      nextPlayer();
    }
  }

  /* ---- Clear AI comments after a while ---- */
  useEffect(() => {
    const t = setTimeout(() => setAiComment({0:null,1:null,2:null}), 4000);
    return () => clearTimeout(t);
  }, [aiComment]);

  /* ===================== RENDER ===================== */

  /* ---- Menu Screen ---- */
  if (screen === 'menu') {
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:30}}>
        <h1 style={{fontSize:48,background:'linear-gradient(135deg,#ff4757,#1e90ff,#2ed573)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:10}}>
          🏰 LABIRYNT QUIZ
        </h1>
        <p style={{color:'#888',fontSize:14,maxWidth:500,textAlign:'center'}}>
          Quiz + Labirynt + Rywalizacja 3 graczy
        </p>
        <div style={{display:'flex',gap:20,marginTop:20}}>
          <button onClick={()=>startGame('multi',null)} style={menuBtnStyle('#ff4757')}>
            👥 3 GRACZY
          </button>
          <button onClick={()=>setScreen('modeSelect')} style={menuBtnStyle('#1e90ff')}>
            🤖 1 GRACZ
          </button>
        </div>
        <div style={{marginTop:40,color:'#555',fontSize:12}}>
          {PLAYERS.map(p => (
            <span key={p.id} style={{color:p.color,marginRight:15}}>{p.emoji} {p.name}</span>
          ))}
        </div>
      </div>
    );
  }

  /* ---- Mode Select (solo) ---- */
  if (screen === 'modeSelect') {
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:30}}>
        <h2 style={{color:'#e0e0e0'}}>Wybierz swoją postać:</h2>
        <div style={{display:'flex',gap:20}}>
          {PLAYERS.map(p => (
            <button key={p.id} onClick={()=>startGame('solo',p.id)}
              style={{...menuBtnStyle(p.color),width:140,height:140,flexDirection:'column',fontSize:16}}>
              <span style={{fontSize:40}}>{p.emoji}</span>
              <span>{p.name}</span>
            </button>
          ))}
        </div>
        <button onClick={()=>setScreen('menu')} style={{background:'none',border:'1px solid #555',color:'#888',padding:'8px 20px',borderRadius:8,cursor:'pointer',fontFamily:'inherit'}}>
          ← Powrót
        </button>
      </div>
    );
  }

  /* ---- Game Over ---- */
  if (screen === 'gameOver') {
    const sorted = [0,1,2].sort((a,b) => scores[b] - scores[a]);
    const medals = ['🥇','🥈','🥉'];
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:20}}>
        <h1 style={{fontSize:36,color:'#ffd700'}}>🏆 KONIEC GRY 🏆</h1>
        <div style={{display:'flex',flexDirection:'column',gap:15,marginTop:20}}>
          {sorted.map((pid,idx) => (
            <div key={pid} style={{display:'flex',alignItems:'center',gap:15,padding:'15px 30px',background:'#1a1a3e',borderRadius:12,border:`2px solid ${PLAYERS[pid].color}`,fontSize:idx===0?24:18}}>
              <span style={{fontSize:idx===0?40:28}}>{medals[idx]}</span>
              <span style={{color:PLAYERS[pid].color,fontWeight:700}}>{PLAYERS[pid].name}</span>
              <span style={{marginLeft:'auto',color:'#ffd700',fontWeight:700}}>{scores[pid]} pkt</span>
              {crowns[pid] > 0 && <span>{'👑'.repeat(crowns[pid])}</span>}
            </div>
          ))}
        </div>
        {levelScores.length > 0 && (
          <div style={{marginTop:10,width:'100%',maxWidth:500}}>
            <h3 style={{textAlign:'center',color:'#888',fontSize:14,marginBottom:8}}>Punkty za labirynty</h3>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr>
                  <th style={{color:'#888',padding:'4px 8px',borderBottom:'1px solid #333',textAlign:'left'}}>Poziom</th>
                  {PLAYERS.map(p => (
                    <th key={p.id} style={{color:p.color,padding:'4px 8px',borderBottom:'1px solid #333',textAlign:'center'}}>{p.name}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {levelScores.map((lp,lvl) => (
                  <tr key={lvl}>
                    <td style={{color:'#888',padding:'4px 8px',borderBottom:'1px solid #222'}}>{MAZE_SIZES[lvl]}x{MAZE_SIZES[lvl]}</td>
                    {PLAYERS.map(p => (
                      <td key={p.id} style={{color:lp[p.id]>0?'#ffd700':'#555',padding:'4px 8px',borderBottom:'1px solid #222',textAlign:'center',fontWeight:700}}>
                        {lp[p.id] > 0 ? `+${lp[p.id]}` : '0'}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        <button onClick={()=>{setScreen('menu');setMazes([null,null,null]);}} style={menuBtnStyle('#1e90ff')}>
          🔄 Nowa gra
        </button>
      </div>
    );
  }

  /* ---- Game Screen ---- */
  if (!mazes[0]) return <div style={{display:'flex',justifyContent:'center',alignItems:'center',height:'100vh'}}>Ładowanie...</div>;

  const otherPlayers = [0,1,2].filter(i => i !== activePlayer);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',padding:8,gap:8}}>
      {/* Score Bar */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#1a1a3e',borderRadius:10,padding:'8px 16px',flexShrink:0}}>
        <div style={{fontSize:13,color:'#888'}}>Poziom {level+1}/{MAZE_SIZES.length} • {MAZE_SIZES[level]}x{MAZE_SIZES[level]}</div>
        <div style={{display:'flex',gap:20}}>
          {PLAYERS.map(p => (
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:6,opacity:finishOrder.includes(p.id)?0.5:1}}>
              <span style={{color:p.color,fontWeight:700,fontSize:14}}>{p.name}</span>
              <span style={{color:'#ffd700',fontWeight:700,fontSize:14}}>{scores[p.id]}</span>
              {streaks[p.id]>=2 && <span style={{fontSize:11}}>🔥{streaks[p.id]}</span>}
              {frozen[p.id] && <span style={{fontSize:11}}>🧊</span>}
              {challenged[p.id] && <span style={{fontSize:11}}>⚡</span>}
              {crowns[p.id]>0 && <span style={{fontSize:11}}>{'👑'.repeat(Math.min(crowns[p.id],3))}</span>}
              {finishOrder.includes(p.id) && <span style={{fontSize:11}}>{['🥇','🥈','🥉'][finishOrder.indexOf(p.id)]}</span>}
            </div>
          ))}
        </div>
      </div>

      {/* Turn Message */}
      {turnMessage && (
        <div style={{textAlign:'center',padding:'10px',background:'#2a2a4e',borderRadius:8,fontSize:15,fontWeight:600,animation:'fadeIn .3s ease'}}>
          {turnMessage}
        </div>
      )}

      {/* Main Area */}
      <div style={{display:'flex',flex:1,gap:8,minHeight:0}}>
        {/* Main Maze */}
        <div style={{flex:3,display:'flex',flexDirection:'column',gap:8,minHeight:0}}>
          <div style={{textAlign:'center',padding:'4px 0'}}>
            <span style={{color:PLAYERS[activePlayer].color,fontWeight:700,fontSize:18}}>
              {PLAYERS[activePlayer].emoji} {PLAYERS[activePlayer].name}{isAI(activePlayer)?' (AI)':''}
              {!isAI(activePlayer) ? ' — Twoja tura' : ''}
            </span>
          </div>
          <div style={{flex:1,display:'flex',justifyContent:'center',alignItems:'center',minHeight:0}}>
            <MazeView maze={mazes[activePlayer]} position={positions[activePlayer]}
              visited={visitedCells[activePlayer]} player={PLAYERS[activePlayer]}
              hints={hints[activePlayer]} onCellClick={handleCellClick}
              isActive={true} isInteractive={!questionPhase && !powerPhase && !isAiTurn && !turnMessage && !overlay && !finishOrder.includes(activePlayer)}/>
          </div>
        </div>

        {/* Side Panel */}
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:8,minWidth:180,maxWidth:250}}>
          {otherPlayers.map(pid => (
            <div key={pid} style={{flex:1,display:'flex',flexDirection:'column',background:'#1a1a3e',borderRadius:10,padding:8,border:`1px solid ${PLAYERS[pid].color}33`,minHeight:0}}>
              <div style={{textAlign:'center',fontSize:12,color:PLAYERS[pid].color,fontWeight:600,marginBottom:4}}>
                {PLAYERS[pid].emoji} {PLAYERS[pid].name}{isAI(pid)?' 🤖':''}
                {finishOrder.includes(pid) && ` ${['🥇','🥈','🥉'][finishOrder.indexOf(pid)]}`}
              </div>
              <div style={{flex:1,display:'flex',justifyContent:'center',alignItems:'center',minHeight:0}}>
                <MazeView maze={mazes[pid]} position={positions[pid]}
                  visited={visitedCells[pid]} player={PLAYERS[pid]}
                  hints={new Set()} onCellClick={()=>{}}
                  isActive={false} isInteractive={false}/>
              </div>
              {isAI(pid) && aiComment[pid] && (
                <div style={{textAlign:'center',fontSize:11,color:PLAYERS[pid].color,marginTop:4,fontStyle:'italic',animation:'fadeIn .3s ease'}}>
                  {aiComment[pid]}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Question / Power Panel */}
      {(questionPhase || powerPhase) && (
        <div className="fade-in" style={{background:'#1a1a3e',borderRadius:12,padding:16,flexShrink:0}}>
          {questionPhase && currentQuestion && <QuestionPanel
            question={currentQuestion} phase={questionPhase} timer={questionTimer}
            selectedAnswer={selectedAnswer} answerResult={answerResult}
            onSkipReading={isAiTurn ? ()=>{} : ()=>{clearInterval(timerRef.current);setQuestionPhase('answering');setQuestionTimer(10);}}
            onAnswer={isAiTurn ? ()=>{} : handleAnswer} player={PLAYERS[activePlayer]}
            isAiTurn={isAiTurn}/>}
          {powerPhase && <PowerPanel player={PLAYERS[activePlayer]} others={[0,1,2].filter(i=>i!==activePlayer&&!finishOrder.includes(i))}
            onUsePower={usePower} frozen={frozen} lastFrozenBy={lastFrozenBy} activePlayer={activePlayer}/>}
        </div>
      )}

      {/* Overlay */}
      {overlay && (
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:1000,
          background:'rgba(15,15,35,0.92)',display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:16,
          animation:'overlayIn 0.4s ease'}}>
          <div style={{fontSize:80,lineHeight:1}}>{overlay.emoji}</div>
          <div style={{fontSize:32,fontWeight:900,color:overlay.color,textAlign:'center',
            textTransform:'uppercase',letterSpacing:2,padding:'0 20px'}}>
            {overlay.title}
          </div>
          {overlay.subtitle && (
            <div style={{fontSize:18,color:'#888',textAlign:'center',fontWeight:400}}>
              {overlay.subtitle}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ===================== MAZE VIEW ===================== */
function MazeView({maze, position, visited, player, hints, onCellClick, isActive, isInteractive}) {
  if (!maze) return null;
  const {cells, size, goal} = maze;
  const containerRef = useRef(null);
  const [containerSize, setContainerSize] = useState(0);

  useEffect(() => {
    const measure = () => {
      if (containerRef.current) {
        const rect = containerRef.current.getBoundingClientRect();
        setContainerSize(Math.min(rect.width, rect.height));
      }
    };
    measure();
    window.addEventListener('resize', measure);
    return () => window.removeEventListener('resize', measure);
  }, []);

  const cellSize = containerSize > 0 ? Math.floor((containerSize - 4) / size) : (isActive ? 50 : 22);
  const wallWidth = isActive ? 2 : 1;

  function isVisible(r, c) {
    const key = `${r},${c}`;
    if (visited.has(key)) return true;
    // Check if neighbor of a visited cell through open passage
    const dirMap = {top:[-1,0],bottom:[1,0],left:[0,-1],right:[0,1]};
    const oppMap = {top:'bottom',bottom:'top',left:'right',right:'left'};
    for (const [wall,[dr,dc]] of Object.entries(dirMap)) {
      const nr = r+dr, nc = c+dc;
      if (nr>=0&&nr<size&&nc>=0&&nc<size&&visited.has(`${nr},${nc}`)) {
        if (!cells[nr][nc].walls[oppMap[wall]]) return true;
      }
    }
    return false;
  }

  const mazePixelSize = cellSize * size + 4;

  return (
    <div ref={containerRef} style={{width:'100%',height:'100%',display:'flex',justifyContent:'center',alignItems:'center'}}>
      <div style={{display:'inline-grid',gridTemplateColumns:`repeat(${size},${cellSize}px)`,gap:0,border:`${wallWidth}px solid #3a3a5c`,background:'#0f0f23',borderRadius:4}}>
        {cells.flat().map(cell => {
          const {r,c,walls} = cell;
          const key = `${r},${c}`;
          const vis = isVisible(r,c);
          const isPos = position[0]===r && position[1]===c;
          const isGoal = goal[0]===r && goal[1]===c;
          const isVisited = visited.has(key);
          const isHint = hints.has(key);
          const canClick = isInteractive && vis && !isPos;

          let bg = '#0a0a1a';
          if (!vis) bg = '#0a0a1a';
          else if (isVisited) bg = '#1a1a3e';
          else bg = '#12122e';

          return (
            <div key={key} onClick={() => canClick && onCellClick(r,c)} style={{
              width:cellSize,height:cellSize,
              background:bg,
              borderTop:`${wallWidth}px solid ${vis && walls.top ? '#3a3a5c' : 'transparent'}`,
              borderRight:`${wallWidth}px solid ${vis && walls.right ? '#3a3a5c' : 'transparent'}`,
              borderBottom:`${wallWidth}px solid ${vis && walls.bottom ? '#3a3a5c' : 'transparent'}`,
              borderLeft:`${wallWidth}px solid ${vis && walls.left ? '#3a3a5c' : 'transparent'}`,
              display:'flex',justifyContent:'center',alignItems:'center',
              cursor:canClick?'pointer':'default',
              position:'relative',
              transition:'background .2s',
              boxShadow: isHint ? `inset 0 0 ${isActive?8:3}px #2ed573, 0 0 ${isActive?12:4}px #2ed57388` : 'none',
              animation: isHint ? 'pulse 1.5s infinite' : 'none',
            }}>
              {vis && isGoal && <span style={{fontSize:isActive?cellSize*0.6:cellSize*0.55}}>🏁</span>}
              {vis && isPos && (
                <div style={{
                  width:isActive?cellSize*0.45:cellSize*0.4,
                  height:isActive?cellSize*0.45:cellSize*0.4,
                  borderRadius:'50%',
                  background:'#fff',
                  boxShadow:`0 0 ${isActive?12:4}px ${player.color}, 0 0 ${isActive?24:8}px ${player.color}88`,
                  position:'absolute',
                }}/>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ===================== QUESTION PANEL ===================== */
function QuestionPanel({question, phase, timer, selectedAnswer, answerResult, onSkipReading, onAnswer, player, isAiTurn}) {
  const isChallenge = question.isChallenge;
  return (
    <div>
      {isChallenge && (
        <div style={{textAlign:'center',marginBottom:10,color:'#ffd700',fontSize:15,fontWeight:700}}>
          ⚡ WYZWANIE — pytanie x2 trudniejsze, brak bonusu za odpowiedź!
        </div>
      )}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span style={{fontSize:13,color:'#888'}}>{question.type === 'hard' ? '🔴 HARD' : '🟡 MEDIUM'}</span>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:20,fontWeight:700,color:timer<=3?'#ff4757':'#ffd700'}}>{timer}s</span>
          {phase === 'reading' && !isAiTurn && (
            <button onClick={onSkipReading} style={{background:player.color,border:'none',color:'#fff',padding:'6px 14px',borderRadius:6,cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}}>
              Wiem → odpowiadam
            </button>
          )}
        </div>
      </div>
      <div style={{fontSize:16,fontWeight:600,marginBottom:14}}>{question.q}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {question.a.map((ans, idx) => {
          const letter = ['A','B','C','D'][idx];
          let btnBg = '#2a2a4e';
          let btnBorder = '#3a3a5c';
          if (phase === 'result') {
            if (idx === question.c) { btnBg = '#2ed57333'; btnBorder = '#2ed573'; }
            else if (idx === selectedAnswer && !answerResult) { btnBg = '#ff475733'; btnBorder = '#ff4757'; }
          } else if (selectedAnswer === idx) {
            btnBg = `${player.color}33`; btnBorder = player.color;
          }
          const disabled = phase !== 'answering' || isAiTurn;
          return (
            <button key={idx} onClick={() => !disabled && onAnswer(idx)} disabled={disabled} style={{
              background:btnBg,border:`2px solid ${btnBorder}`,color:'#e0e0e0',padding:'10px 14px',borderRadius:8,
              cursor:disabled?'default':'pointer',fontFamily:'inherit',fontSize:14,textAlign:'left',
              opacity: disabled && phase === 'reading' ? 0.5 : 1,transition:'all .2s',
            }}>
              <span style={{fontWeight:700,marginRight:8,color:player.color}}>{letter}.</span>{ans}
            </button>
          );
        })}
      </div>
      {phase === 'result' && (
        <div style={{textAlign:'center',marginTop:12,fontSize:18,fontWeight:700,color:answerResult?'#2ed573':'#ff4757'}}>
          {answerResult ? '✓ Dobrze!' : '✗ Źle!'}
        </div>
      )}
    </div>
  );
}

/* ===================== POWER PANEL ===================== */
function PowerPanel({player, others, onUsePower, frozen, lastFrozenBy, activePlayer}) {
  const [selectedPower, setSelectedPower] = useState(null);

  const powers = [
    {id:'freeze',emoji:'🧊',name:'Zamrożenie',desc:'Przeciwnik traci następną turę'},
    {id:'challenge',emoji:'⚡',name:'Wyzwanie',desc:'Przeciwnik dostaje pytanie HARD'},
    {id:'crown',emoji:'👑',name:'Korona',desc:'+1 punkt bonusowy'},
  ];

  function handleSelect(power) {
    if (power === 'crown') {
      onUsePower('crown', activePlayer);
    } else {
      setSelectedPower(power);
    }
  }

  if (selectedPower && others.length > 0) {
    return (
      <div>
        <div style={{textAlign:'center',fontSize:15,fontWeight:600,marginBottom:12}}>
          {selectedPower === 'freeze' ? '🧊' : '⚡'} Wybierz cel:
        </div>
        <div style={{display:'flex',justifyContent:'center',gap:12}}>
          {others.map(pid => {
            const cantFreeze = selectedPower === 'freeze' && lastFrozenBy[pid] === activePlayer;
            return (
              <button key={pid} disabled={cantFreeze} onClick={() => !cantFreeze && onUsePower(selectedPower, pid)} style={{
                background: cantFreeze ? '#1a1a3e' : `${PLAYERS[pid].color}22`,
                border:`2px solid ${cantFreeze ? '#333' : PLAYERS[pid].color}`,
                color: cantFreeze ? '#555' : PLAYERS[pid].color,
                padding:'12px 24px',borderRadius:10,cursor:cantFreeze?'not-allowed':'pointer',
                fontFamily:'inherit',fontSize:15,fontWeight:600,
              }}>
                {PLAYERS[pid].emoji} {PLAYERS[pid].name}
                {cantFreeze && <div style={{fontSize:10,color:'#666'}}>Nie można ponownie</div>}
              </button>
            );
          })}
          <button onClick={() => setSelectedPower(null)} style={{background:'none',border:'1px solid #555',color:'#888',padding:'12px 16px',borderRadius:10,cursor:'pointer',fontFamily:'inherit',fontSize:13}}>
            ← Wróć
          </button>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{textAlign:'center',fontSize:15,fontWeight:600,marginBottom:12,color:player.color}}>
        ✓ Poprawna odpowiedź! Wybierz moc:
      </div>
      <div style={{display:'flex',justifyContent:'center',gap:12}}>
        {powers.map(p => {
          const needsTarget = p.id !== 'crown';
          const disabled = needsTarget && others.length === 0;
          return (
            <button key={p.id} disabled={disabled} onClick={() => !disabled && handleSelect(p.id)} style={{
              background:'#2a2a4e',border:'2px solid #3a3a5c',color:'#e0e0e0',
              padding:'12px 20px',borderRadius:10,cursor:disabled?'not-allowed':'pointer',
              fontFamily:'inherit',fontSize:14,textAlign:'center',opacity:disabled?0.4:1,
              transition:'all .2s',display:'flex',flexDirection:'column',alignItems:'center',gap:4,minWidth:120,
            }}>
              <span style={{fontSize:28}}>{p.emoji}</span>
              <span style={{fontWeight:600}}>{p.name}</span>
              <span style={{fontSize:11,color:'#888'}}>{p.desc}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ===================== STYLES ===================== */
function menuBtnStyle(color) {
  return {
    background:`${color}22`,border:`2px solid ${color}`,color:color,
    padding:'16px 32px',borderRadius:12,cursor:'pointer',
    fontFamily:'inherit',fontSize:20,fontWeight:700,
    display:'flex',alignItems:'center',gap:10,transition:'all .2s',
  };
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
